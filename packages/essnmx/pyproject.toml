[build-system]
requires = [
  "setuptools>=77",
  "setuptools_scm[toml]>=8.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "essnmx"
description = "Data reduction for NMX at the European Spallation Source."
authors = [{ name = "Scipp contributors" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]
readme = "README.md"
classifiers = [
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
requires-python = ">=3.11"

# IMPORTANT:
# Run 'tox -e deps' after making changes here. This will update requirement files.
# Make sure to list one dependency per line.
dependencies = [
  "dask>=2022.1.0",
  "essreduce>=26.4.0",
  "graphviz",
  "plopp>=24.7.0",
  "sciline>=24.06.0",
  "scipp>=25.3.0",
  "scippnexus>=23.12.0",
  "scippneutron>=26.03.0",
  "pooch>=1.5",
  "pandas>=2.1.2",
  "gemmi>=0.6.6",
  "defusedxml>=0.7.1",
  "msgpack>=1.0.8",
  "tof>=25.12.1",
  "numpy>=2.0.0",
]

dynamic = ["version"]

[project.scripts]
essnmx_reduce_mcstas = "ess.nmx.mcstas.executables:main"
essnmx-reduce = "ess.nmx.executables:main"

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "bitshuffle>=0.5.2;os_name == 'posix'",
]
docs = [
  "autodoc-pydantic",
  "ipykernel",
  "ipython!=8.7.0", # Breaks syntax highlighting in Jupyter code cells.
  "myst-parser",
  "nbsphinx",
  "pydata-sphinx-theme>=0.14",
  "sphinx<9.0.0",
  "sphinx-autodoc-typehints",
  "sphinx-copybutton",
  "sphinx-design",
  "pythreejs", # For instrument view.
  "scippneutron",
]

[project.urls]
"Bug Tracker" = "https://github.com/scipp/ess/issues"
"Documentation" = "https://scipp.github.io/ess/nmx"
"Source" = "https://github.com/scipp/ess/tree/main/packages/essnmx"

[tool.setuptools_scm]
root = "../.."
tag_regex = "^essnmx/(?P<version>[vV]?\\d+.*)$"
git_describe_command = [ "git", "describe", "--dirty", "--tags", "--long", "--match", "essnmx/*[0-9]*" ]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = """
--strict-config
--strict-markers
--import-mode=importlib
-ra
-v
"""
testpaths = "tests"
filterwarnings = [
  "error",
]

[tool.mypy]
strict = true
ignore_missing_imports = true
enable_error_code = [
    "ignore-without-code",
    "redundant-expr",
    "truthy-bool",
]
warn_unreachable = true
