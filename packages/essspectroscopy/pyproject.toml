[build-system]
requires = [
    "setuptools>=77",
    "setuptools_scm[toml]>=8.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "essspectroscopy"
description = "Spectroscopy data reduction for the European Spallation Source "
authors = [{ name = "Scipp contributors" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]
readme = "README.md"
classifiers = [
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
requires-python = ">=3.11"

# IMPORTANT:
# Run 'tox -e deps' after making changes here. This will update requirement files.
# Make sure to list one dependency per line.
dependencies = [
    "essreduce>=26.4.1",
    "graphviz>=0.20",
    "pandas>=2.1.2",
    "sciline>=25.4.1",
    "scipp>=26.1.0",
    "scippneutron>=25.11.2",
    "scippnexus>=24.9.0",
    "tof>=25.11.0",
]

dynamic = ["version"]

[project.optional-dependencies]
test = [
    "pooch>=1.5",
    "pytest>=7.0",
]
docs = [
    "autodoc-pydantic",
    "ipykernel",
    "ipympl",
    "ipython!=8.7.0",  # Breaks syntax highlighting in Jupyter code cells.
    "ipywidgets",
    "myst-parser",
    "nbsphinx",
    "pandas",
    "pooch",
    "pydata-sphinx-theme>=0.14",
    "sphinx",
    "sphinx-autodoc-typehints",
    "sphinx-copybutton",
    "sphinx-design",
]

[project.urls]
"Bug Tracker" = "https://github.com/scipp/ess/issues"
"Documentation" = "https://scipp.github.io/ess/spectroscopy"
"Source" = "https://github.com/scipp/ess/tree/main/packages/essspectroscopy"

[tool.setuptools_scm]
root = "../.."
tag_regex = "^essspectroscopy/(?P<version>[vV]?\\d+(?:\\.\\d+)*(?:[._-]?\\w+)*)$"
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "essspectroscopy/*[0-9]*"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = """
--strict-config
--strict-markers
--import-mode=importlib
-ra
-v
"""
testpaths = "tests"
filterwarnings = [
    "error",
    # Plotting related warnings.
    'ignore:\n            Sentinel is not a public part of the traitlets API:DeprecationWarning',
]

[tool.mypy]
strict = true
ignore_missing_imports = true
enable_error_code = [
    "ignore-without-code",
    "redundant-expr",
    "truthy-bool",
]
warn_unreachable = true
