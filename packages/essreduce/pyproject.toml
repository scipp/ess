[build-system]
requires = [
  "setuptools>=77",
  "setuptools_scm[toml]>=8.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "essreduce"
description = "Common data reduction tools for the ESS facility"
authors = [{ name = "Scipp contributors" }]
license = "BSD-3-Clause"
readme = "README.md"
classifiers = [
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
# The min python version should be updated in the root pixi.toml file
# pre-commit will automatically update the following pin
requires-python = ">=3.11"

dynamic = ["version"]

dependencies = [
    "dask>=2022.1.0",
    "graphviz>=0.20",
    "sciline>=25.11.0",
    "scipp>=26.3.1",
    "scippneutron>=26.5.0",
    "scippnexus>=25.06.0",
    "scipy>=1.14",
]

[project.optional-dependencies]
test = [
    "ipywidgets>=8.1",
    "matplotlib>=3.10.7",
    "numba>=0.63",
    "pooch>=1.9.0",
    "pytest>=7.0",
    "tof>=25.12.0",
    "pandas>=2.1.2",
]
docs = [
    "autodoc-pydantic",
    "graphviz>=0.20",
    "ipykernel",
    "ipython!=8.7.0",
    "ipywidgets>=8.1",
    "myst-parser",
    "nbsphinx",
    "numba>=0.63",
    "plopp",
    "pydata-sphinx-theme>=0.14",
    "sphinx>=7",
    "sphinx-autodoc-typehints",
    "sphinx-copybutton",
    "sphinx-design",
    "tof>=25.12.0",
    "sphinxcontrib-mermaid",
    "sympy",
]

[project.scripts]
grow-nexus = "ess.reduce.scripts.grow_nexus:main"

[project.urls]
"Bug Tracker" = "https://github.com/scipp/ess/issues"
"Documentation" = "https://scipp.github.io/ess/reduce"
"Source" = "https://github.com/scipp/ess/tree/main/packages/essreduce"

[tool.setuptools_scm]
root = "../.."
tag_regex = "^essreduce/(?P<version>.*)$"
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "essreduce/*[0-9]*"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = """
--strict-config
--strict-markers
--import-mode=importlib
-ra
-v
"""
testpaths = "tests"
filterwarnings = [
  "error",
  'ignore:\n            Sentinel is not a public part of the traitlets API:DeprecationWarning',
  'ignore:Jupyter is migrating its paths:DeprecationWarning',
]

[tool.mypy]
strict = true
ignore_missing_imports = true
enable_error_code = [
    "ignore-without-code",
    "redundant-expr",
    "truthy-bool",
]
warn_unreachable = true
