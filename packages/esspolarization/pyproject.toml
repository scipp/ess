[build-system]
requires = [
  "setuptools>=77",
  "setuptools_scm[toml]>=8.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "esspolarization"
description = "Polarization data reduction for the European Spallation Source"
authors = [{ name = "Scipp contributors" }]
license = "BSD-3-Clause"
license-files = ["../../LICENSE"]
readme = "README.md"
classifiers = [
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
requires-python = ">=3.11"

# IMPORTANT:
# Run 'tox -e deps' after making changes here. This will update requirement files.
# Make sure to list one dependency per line.
dependencies = [
  "dask>=2022.1.0",
  "graphviz",
  "sciline>=25.04.1",
  "scipp>=23.8.0",
  "scipy>=1.14",
  "essreduce>=24.07.1",
]

dynamic = ["version"]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pandas>=2.1.2",
    "pooch>=1.5",
]
docs = [
    "esssans",
    "autodoc-pydantic",
    "ipykernel",
    # Breaks syntax highlighting in Jupyter code cells.
    "ipython!=8.7.0",
    "myst-parser",
    "nbsphinx",
    "pydata-sphinx-theme>=0.14",
    "sphinx",
    "sphinx-autodoc-typehints",
    "sphinx-copybutton",
    "sphinx-design",
    "sphinxcontrib-mermaid",
    "sympy",
]

[project.urls]
"Bug Tracker" = "https://github.com/scipp/esspolarization/issues"
"Documentation" = "https://scipp.github.io/esspolarization"
"Source" = "https://github.com/scipp/esspolarization"

[tool.setuptools_scm]
root = "../.."
tag_regex = "^esspolarization/(?P<version>[vV]?\\d+(?:\\.\\d+)*(?:[._-]?\\w+)*)$"
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "esspolarization/*[0-9]*"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = """
--strict-config
--strict-markers
--import-mode=importlib
-ra
-v
"""
testpaths = "tests"
filterwarnings = [
  "error",
]


[tool.mypy]
strict = true
ignore_missing_imports = true
enable_error_code = [
    "ignore-without-code",
    "redundant-expr",
    "truthy-bool",
]
warn_unreachable = true
