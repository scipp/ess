[build-system]
requires = [
  "setuptools>=77",
  "setuptools_scm[toml]>=8.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "essimaging"
description = "Imaging data reduction for the European Spallation Source"
authors = [{ name = "Scipp contributors" }]
license = "BSD-3-Clause"
readme = "README.md"
classifiers = [
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
# The min python version should be updated in the root pixi.toml file
# pre-commit will automatically update the following pin
requires-python = ">=3.11"

dynamic = ["version"]

dependencies = [
  "dask>=2022.1.0",
  "graphviz",
  "plopp[all]>=23.10.0",
  "sciline>=23.9.1",
  "scipp>=25.4.0",
  "scippneutron>=24.12.0",
  "scippnexus>=23.11.1",
  "tifffile>=2024.7.2",
  "essreduce>=26.4.0",
  "scitiff>=25.7",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pooch>=1.5",
    "tof>=25.08.0",
    "scitiff>=24.6.0",
]
docs = [
    "autodoc-pydantic",
    "ipykernel",
    "ipython!=8.7.0",
    "myst-parser",
    "nbsphinx",
    "pooch>=1.5",
    "pydata-sphinx-theme>=0.14",
    "sphinx>=7",
    "sphinx-autodoc-typehints",
    "sphinx-copybutton",
    "sphinx-design",
    "tof>=25.08.0",
    "tqdm",
]

[project.urls]
"Bug Tracker" = "https://github.com/scipp/ess/issues"
"Documentation" = "https://scipp.github.io/ess/imaging"
"Source" = "https://github.com/scipp/ess/tree/main/packages/essimaging"

[tool.setuptools_scm]
root = "../.."
tag_regex = "^essimaging/(?P<version>\\d+.*)$"
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "essimaging/*[0-9]*"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = """
--strict-config
--strict-markers
--import-mode=importlib
-ra
-v
"""
testpaths = "tests"
filterwarnings = [
  "error",
  # Plotting related warnings.
  'ignore:\n            Sentinel is not a public part of the traitlets API:DeprecationWarning'
]

[tool.mypy]
strict = true
ignore_missing_imports = true
enable_error_code = [
    "ignore-without-code",
    "redundant-expr",
    "truthy-bool",
]
warn_unreachable = true
