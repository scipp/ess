[workspace]
name = "ess"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "2026.2.0"

[dependencies]
python = "3.11.*"

# ==================== Parameterized tasks ====================

[tasks.test]
cmd = "pytest packages/{{ package }}/tests/"
args = ["package"]

# ==================== Package features ====================

# essreduce (core package, no workspace deps)
[feature.essreduce.pypi-dependencies]
essreduce = { path = "packages/essreduce", editable = true, extras = ["test"] }

# essimaging (depends on essreduce)
[feature.essimaging.pypi-dependencies]
essimaging = { path = "packages/essimaging", editable = true, extras = ["test"] }

# essnmx (depends on essreduce)
[feature.essnmx.pypi-dependencies]
essnmx = { path = "packages/essnmx", editable = true, extras = ["test"] }

# essreflectometry (depends on essreduce)
[feature.essreflectometry.pypi-dependencies]
essreflectometry = { path = "packages/essreflectometry", editable = true, extras = ["test"] }

# esssans (depends on essreduce)
[feature.esssans.pypi-dependencies]
esssans = { path = "packages/esssans", editable = true, extras = ["test"] }

# ==================== Dev feature ====================

[feature.dev.pypi-dependencies]
# Matplotlib is buggy for later ipykernel
ipykernel = "<7"
jupyterlab = ">=4.4"

# ==================== Lint feature ====================

[feature.lint.pypi-dependencies]
pre-commit = "*"
ruff = ">=0.15"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
check = "ruff check ."
format = "ruff format ."

# ==================== Docs feature ====================

[feature.docs.dependencies]
pandoc = "*"
python-graphviz = "*"

# Per-package docs features (install with docs extra)
[feature.docs-essreduce.pypi-dependencies]
essreduce = { path = "packages/essreduce", editable = true, extras = ["test", "docs"] }

[feature.docs-essreduce.tasks.docs-essreduce]
cmd = "python -m sphinx -v -b html -d packages/essreduce/.docs_doctrees packages/essreduce/docs packages/essreduce/html"
default-environment = "docs-essreduce"

[feature.docs-essimaging.pypi-dependencies]
essimaging = { path = "packages/essimaging", editable = true, extras = ["test", "docs"] }

[feature.docs-essimaging.tasks.docs-essimaging]
cmd = "python -m sphinx -v -b html -d packages/essimaging/.docs_doctrees packages/essimaging/docs packages/essimaging/html"

[feature.docs-essnmx.pypi-dependencies]
essnmx = { path = "packages/essnmx", editable = true, extras = ["test", "docs"] }

[feature.docs-essnmx.tasks.docs-essnmx]
cmd = "python -m sphinx -v -b html -d packages/essnmx/.docs_doctrees packages/essnmx/docs packages/essnmx/html"

[feature.docs-essreflectometry.pypi-dependencies]
essreflectometry = { path = "packages/essreflectometry", editable = true, extras = ["test", "docs"] }

[feature.docs-essreflectometry.tasks.docs-essreflectometry]
cmd = "python -m sphinx -v -b html -d packages/essreflectometry/.docs_doctrees packages/essreflectometry/docs packages/essreflectometry/html"

[feature.docs-esssans.pypi-dependencies]
esssans = { path = "packages/esssans", editable = true, extras = ["test", "docs"] }

[feature.docs-esssans.tasks.docs-esssans]
cmd = "python -m sphinx -v -b html -d packages/esssans/.docs_doctrees packages/esssans/docs packages/esssans/html"

# ==================== Environments ====================

[environments]
# Default: all packages (for full dev setup)
default = { features = ["dev", "essreduce", "essimaging", "essnmx", "essreflectometry", "esssans"], solve-group = "default" }

# Per-package test environments (include workspace dep features)
essreduce = { features = ["essreduce"], solve-group = "default" }
essimaging = { features = ["essimaging", "essreduce"], solve-group = "default" }
essnmx = { features = ["essnmx", "essreduce"], solve-group = "default" }
essreflectometry = { features = ["essreflectometry", "essreduce"], solve-group = "default" }
esssans = { features = ["esssans", "essreduce"], solve-group = "default" }

# Lower-bound test environments (separate resolution)
lb-essreduce = { features = ["essreduce"], solve-group = "lower-bound" }
lb-essimaging = { features = ["essimaging", "essreduce"], solve-group = "lower-bound" }
lb-essnmx = { features = ["essnmx", "essreduce"], solve-group = "lower-bound" }
lb-essreflectometry = { features = ["essreflectometry", "essreduce"], solve-group = "lower-bound" }
lb-esssans = { features = ["esssans", "essreduce"], solve-group = "lower-bound" }

# Docs environments (package with docs extra + pandoc)
docs-essreduce = { features = ["docs-essreduce", "docs"], solve-group = "default" }
docs-essimaging = { features = ["docs-essimaging", "docs-essreduce", "docs"], solve-group = "default" }
docs-essnmx = { features = ["docs-essnmx", "docs-essreduce", "docs"], solve-group = "default" }
docs-essreflectometry = { features = ["docs-essreflectometry", "docs-essreduce", "docs"], solve-group = "default" }
docs-esssans = { features = ["docs-esssans", "docs-essreduce", "docs"], solve-group = "default" }

# Lint environment (standalone, no package deps)
lint = { features = ["lint"], solve-group = "lint" }
